name: iOS Build

# CI: generates the Xcode project with XcodeGen on a macOS runner and
# builds the app for the iOS Simulator. No code signing required (simulator build).
# macOS minutes are free for public repos — this is the hybrid dev workflow:
# code authored on Linux, built/validated in the cloud, no Mac hardware needed.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build-simulator:
    name: Build for iOS Simulator
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project GaussianSplattingViewer.xcodeproj \
            -scheme GaussianSplattingViewer \
            -resolvePackageDependencies

      - name: Build (iOS Simulator, no signing)
        run: |
          xcodebuild \
            -project GaussianSplattingViewer.xcodeproj \
            -scheme GaussianSplattingViewer \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  # M3: TestFlight upload. Only runs when Apple signing secrets are configured
  # as repository secrets. Until then, this job is skipped automatically.
  testflight:
    name: Upload to TestFlight
    runs-on: macos-15
    needs: build-simulator
    if: ${{ secrets.APPLE_APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install Fastlane
        run: brew install fastlane

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Configure fastlane Appfile
        run: |
          cat > fastlane/Appfile <<EOF
          app_identifier("${{ secrets.APPLE_APP_ID }}")
          apple_id("${{ secrets.APPLE_ID }}")
          team_id("${{ secrets.APPLE_TEAM_ID }}")
          itc_team_id("${{ secrets.APPLE_ITC_TEAM_ID }}")
          EOF

      - name: Setup code signing
        run: fastlane match appstore
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}

      - name: Build and upload to TestFlight
        run: fastlane beta
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
