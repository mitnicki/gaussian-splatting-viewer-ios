# iOS Build & TestFlight CI
#
# Simulator build: every push (no Apple account needed)
# TestFlight upload: only when ENABLE_TESTFLIGHT repo variable is "true"

name: iOS Build

on:
  push:
    branches: [main, master]
    paths:
      - 'App/**'
      - 'Model/**'
      - 'Scene/**'
      - 'Util/**'
      - 'Assets.xcassets/**'
      - 'Fonts/**'
      - 'project.yml'
      - 'fastlane/**'
      - 'scripts/**'
      - '.github/workflows/ios-build.yml'
      - '.github/workflows/app-store-release.yml'
  workflow_dispatch:
    inputs:
      testflight:
        description: "Upload to TestFlight?"
        type: boolean
        default: false
      configure_app_store:
        description: "Configure App Store metadata + screenshots?"
        type: boolean
        default: false

jobs:
  build-simulator:
    name: Build for iOS Simulator
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project GaussianSplattingViewer.xcodeproj \
            -scheme GaussianSplattingViewer \
            -resolvePackageDependencies

      - name: Build (iOS Simulator, no signing)
        run: |
          xcodebuild \
            -project GaussianSplattingViewer.xcodeproj \
            -scheme GaussianSplattingViewer \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  testflight:
    name: Upload to TestFlight
    runs-on: macos-26
    needs: build-simulator
    timeout-minutes: 45
    if: ${{ vars.ENABLE_TESTFLIGHT == 'true' || github.event.inputs.testflight == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen + Fastlane
        run: |
          brew install xcodegen
          gem install fastlane

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Create empty Appfile (API key auth, no 2FA)
        run: |
          mkdir -p fastlane
          cat > fastlane/Appfile <<EOF
          app_identifier("cloud.dkroeker.GaussianSplattingViewer")
          EOF

      - name: Create app in App Store Connect
        continue-on-error: true
        run: python3 scripts/create_asc_app.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}

      - name: Revoke orphaned distribution certificates
        continue-on-error: true
        run: python3 scripts/revoke_certs.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}

      - name: Build and upload to TestFlight
        run: fastlane beta
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

  add-to-internal:
    name: Add to Internal Testers
    runs-on: ubuntu-latest
    needs: testflight
    if: ${{ vars.ENABLE_TESTFLIGHT == 'true' || github.event.inputs.testflight == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cryptography
        run: pip install cryptography
      - name: Move build to internal group
        run: python3 scripts/move_builds_to_internal.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}

  configure-app-store:
    name: Configure App Store Metadata
    runs-on: ubuntu-latest
    needs: build-simulator
    if: ${{ github.event.inputs.configure_app_store == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install cryptography pillow
      - name: Configure App Store metadata and upload screenshots
        run: python3 scripts/configure_app_store.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}

  submit-review:
    name: Submit for Beta Review
    runs-on: ubuntu-latest
    needs: testflight
    if: ${{ vars.ENABLE_TESTFLIGHT == 'true' || github.event.inputs.testflight == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cryptography
        run: pip install cryptography
      - name: Submit beta review
        run: python3 scripts/submit_beta_review.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}
