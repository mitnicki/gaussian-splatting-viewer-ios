# iOS Build & TestFlight CI
#
# Simulator build: every push (no Apple account needed)
# TestFlight upload: only when ENABLE_TESTFLIGHT repo variable is "true"

name: iOS Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      testflight:
        description: "Upload to TestFlight?"
        type: boolean
        default: false

jobs:
  build-simulator:
    name: Build for iOS Simulator
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild \
            -project GaussianSplattingViewer.xcodeproj \
            -scheme GaussianSplattingViewer \
            -resolvePackageDependencies

      - name: Build (iOS Simulator, no signing)
        run: |
          xcodebuild \
            -project GaussianSplattingViewer.xcodeproj \
            -scheme GaussianSplattingViewer \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  testflight:
    name: Upload to TestFlight
    runs-on: macos-26
    needs: build-simulator
    if: ${{ vars.ENABLE_TESTFLIGHT == 'true' || github.event.inputs.testflight == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen + Fastlane
        run: |
          brew install xcodegen
          gem install fastlane

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Create empty Appfile (API key auth, no 2FA)
        run: |
          mkdir -p fastlane
          cat > fastlane/Appfile <<EOF
          app_identifier("cloud.dkroeker.GaussianSplattingViewer")
          EOF

      - name: Create app in App Store Connect
        continue-on-error: true
        run: python3 scripts/create_asc_app.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}

      - name: Build and upload to TestFlight
        run: fastlane beta
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
