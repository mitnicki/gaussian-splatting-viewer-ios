# App Store Screenshots — generates via xcrun simctl on macOS runner.
# Triggers on push to trigger-screenshots branch (PAT workaround) or manual dispatch.
name: App Store Screenshots

on:
  workflow_dispatch:
  push:
    branches:
      - trigger-screenshots

jobs:
  screenshots:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Boot simulator
        run: |
          set +e
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              for d in devices:
                  if 'iPhone' in d.get('name', '') and ('Pro Max' in d.get('name', '') or 'Pro Max' in d.get('type', '')):
                      print(d['udid'])
                      sys.exit(0)
          for runtime, devices in data.get('devices', {}).items():
              for d in devices:
                  if 'iPhone' in d.get('name', ''):
                      print(d['udid'])
                      sys.exit(0)
          ")
          if [ -z "$DEVICE_ID" ]; then
            echo "No suitable device found, creating one..."
            RUNTIME_ID=$(xcrun simctl list runtimes available -j | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            for r in data.get('runtimes', []):
                if 'iOS' in r.get('name', ''):
                    print(r['identifier'])
                    sys.exit(0)
            ")
            echo "Runtime: $RUNTIME_ID"
            DEVICE_ID=$(xcrun simctl create "ScreenshotDevice" "com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro-Max" "$RUNTIME_ID")
          fi
          echo "DEVICE_ID=$DEVICE_ID"
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$DEVICE_ID"

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project GaussianSplattingViewer.xcodeproj \
            -scheme GaussianSplattingViewer \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation 2>&1

      - name: Find .app
        run: |
          APP_PATH=$(find ./build/Build/Products -name "GaussianSplattingViewer.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Capture home screen (en-US)
        run: |
          mkdir -p screenshots/en-US screenshots/de-DE
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          # Launch WITHOUT -autoDemo so we see the home screen
          xcrun simctl launch "$DEVICE_ID" cloud.dkroeker.GaussianSplattingViewer
          sleep 5
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/en-US/01_home.png
          # Terminate app
          xcrun simctl terminate "$DEVICE_ID" cloud.dkroeker.GaussianSplattingViewer || true

      - name: Capture demo scene (en-US)
        run: |
          # Relaunch WITH -autoDemo to auto-load demo scene
          xcrun simctl launch "$DEVICE_ID" cloud.dkroeker.GaussianSplattingViewer -autoDemo
          sleep 10
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/en-US/02_demo_scene.png
          xcrun simctl terminate "$DEVICE_ID" cloud.dkroeker.GaussianSplattingViewer || true

      - name: Capture home screen (de-DE)
        run: |
          # Set simulator language to German
          xcrun simctl shutdown "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl language "$DEVICE_ID" de-DE 2>/dev/null || true
          # Also override locale
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$DEVICE_ID"
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_ID" cloud.dkroeker.GaussianSplattingViewer
          sleep 5
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/de-DE/01_home.png
          xcrun simctl terminate "$DEVICE_ID" cloud.dkroeker.GaussianSplattingViewer || true

      - name: Capture demo scene (de-DE)
        run: |
          xcrun simctl launch "$DEVICE_ID" cloud.dkroeker.GaussianSplattingViewer -autoDemo
          sleep 10
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/de-DE/02_demo_scene.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: app-store-screenshots
          path: screenshots/

      - name: Delete simulator
        if: always()
        run: xcrun simctl delete "$DEVICE_ID" 2>/dev/null || true
