name: Submit App Store Review

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "App Store version string (e.g. 1.0.0)"
        required: true
        type: string
        default: "1.0.0"
      price_tier:
        description: "App Store price tier (3 = 2.99 EUR)"
        required: true
        type: string
        default: "3"
  push:
    tags:
      - "v*"

# ponytail: tag trigger lets us submit without workflow_dispatch PAT scope

jobs:
  submit-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install dependencies
        run: |
          pip install cryptography
          gem install fastlane --no-document

      - name: Push metadata to App Store Connect
        run: fastlane deliver_metadata
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}

      - name: Submit App Store review
        run: python3 scripts/submit_app_store_review.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}
          APP_VERSION: ${{ inputs.app_version || github.ref_name | replace('v', '') }}
          PRICE_TIER: ${{ inputs.price_tier || '3' }}
