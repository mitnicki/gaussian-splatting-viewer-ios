name: Add Nick Beta Tester
on:
  push:
    branches: [master]
    paths: ['.github/trigger-add-tester']
jobs:
  add-tester:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message == 'add-tester: nick@kroeker.cloud'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install cryptography
        run: pip install cryptography
      - name: Add beta tester
        run: python3 scripts/add_beta_tester.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}
          BETA_TESTER_EMAIL: nick@kroeker.cloud
          BETA_TESTER_FIRST_NAME: Nick
          BETA_TESTER_LAST_NAME: Kroeker
