name: App Store Release

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action: configure (metadata+screenshots) or submit_review"
        required: true
        type: choice
        default: "configure"
        options:
          - configure
          - submit_review

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install cryptography pillow

      - name: Configure App Store metadata and upload screenshots
        if: ${{ github.event.inputs.action == 'configure' }}
        run: python3 scripts/configure_app_store.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}

      - name: Submit for App Store Review
        if: ${{ github.event.inputs.action == 'submit_review' }}
        run: python3 scripts/submit_review.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}
