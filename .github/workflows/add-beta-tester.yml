name: Add Beta Tester

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Beta tester email"
        required: true
        type: string
      first_name:
        description: "First name (optional)"
        required: false
        type: string
        default: ""
      last_name:
        description: "Last name (optional)"
        required: false
        type: string
        default: ""

jobs:
  add-tester:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cryptography
        run: pip install cryptography

      - name: Add beta tester
        run: python3 scripts/add_beta_tester.py
        env:
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_P8_CONTENTS }}
          BETA_TESTER_EMAIL: ${{ inputs.email }}
          BETA_TESTER_FIRST_NAME: ${{ inputs.first_name }}
          BETA_TESTER_LAST_NAME: ${{ inputs.last_name }}
