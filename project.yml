# XcodeGen project spec for the Gaussian Splatting Viewer iOS app.
# Generate the .xcodeproj on a Mac (or in CI) with:  xcodegen generate
# M1: PoC scaffold (MetalSplatter + .spz load, CI build)
# M2: Nextcloud WebDAV browser + on-device cache
name: GaussianSplattingViewer
options:
  bundleIdPrefix: cloud.dkroeker
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  MetalSplatter:
    url: https://github.com/scier/MetalSplatter.git
    from: "1.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_BITCODE: NO

targets:
  GaussianSplattingViewer:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Scene
      - path: Model
      - path: Util
      - path: Assets.xcassets
      - path: Fonts
        type: folder
        buildPhase: resources
    dependencies:
      - package: MetalSplatter
        product: MetalSplatter
      - package: MetalSplatter
        product: SplatIO
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Gaussian Splatting Viewer
        CFBundleShortVersionString: "0.7.0"
        CFBundleVersion: "8"
        UILaunchScreen:
          UIColorName: "ciBgBase"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - InterVariable.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
          - JetBrainsMono-Bold.ttf
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            dkroeker.de:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cloud.dkroeker.GaussianSplattingViewer
        MARKETING_VERSION: "0.7.0"
        CURRENT_PROJECT_VERSION: "8"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
